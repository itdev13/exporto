<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="ExportKit">
  <title>ExportKit</title>
  <defs>
    <linearGradient id="ek-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="ek-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="256" height="256" rx="32" fill="#0F172A"/>

  <!-- Logo mark centered -->
  <g transform="translate(48, 48) scale(1.6)">
    <!-- Glow layer -->
    <g opacity="0.35" filter="url(#glow)">
      <path d="M58 26 L28 26 L28 74 L58 74"
        stroke="url(#ek-glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <line x1="28" y1="50" x2="72" y2="50"
        stroke="url(#ek-glow)" stroke-width="8" stroke-linecap="round"/>
      <path d="M63 41 L74 50 L63 59"
        stroke="url(#ek-glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Rounded square container -->
    <rect x="10" y="10" width="80" height="80" rx="16"
      stroke="url(#ek-grad)" stroke-width="2.5" fill="url(#ek-grad)" fill-opacity="0.06"
      stroke-linecap="round"/>
    <!-- E-frame -->
    <path d="M58 26 L28 26 L28 74 L58 74"
      stroke="url(#ek-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Middle bar -->
    <line x1="28" y1="50" x2="72" y2="50"
      stroke="url(#ek-grad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Arrow head -->
    <path d="M63 41 L74 50 L63 59"
      stroke="url(#ek-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
